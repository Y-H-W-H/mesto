<!DOCTYPE html>
<html lang="ru">

<head>
  <meta name="description" content="Проект 4-го cпринта">
  <meta name="keywords" content="mesto">
  <meta name="author" content="Тужиков Роман">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href="./pages/index.css">
  <link rel='stylesheet' href="./vendor/normalize.css">
  <title>Mesto</title>

</head>

<body class="root">


  <header class="header">
    <img src="./images/logo.svg" alt="Лого" class="header__logo">
  </header>

  <main class="main">
    <section class="profile">
      <div class="profile__container">
        <img src="./images/avatar.jpg" alt="Лик Кусто" class="profile__avatar">
        <div class="profile__info">
          <h1 class="profile__text profile__text_name">Жак-Ив Кусто</h1>
          <button class="profile__button_edit"></button>
          <p class="profile__text profile__text_about">Исследователь океана</p>
        </div>
      </div>
      <button class="profile__button_add"></button>
    </section>


    <section class="elements">
      <ul class="elements__list">
        <li class="elements__card">
          <img src="./images/kirill-pershin-1088404-unsplash.png" alt="Карачаевск" class="elements__image">
          <div class="elements__bottom">
            <h2 class=" elements__header">Карачаевск</h2>
            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
        <li class="elements__card">
          <img src="./images//kirill-pershin-1404681-unsplash(1).png" alt="Гора Эльбрус" class="elements__image">
          <div class="elements__bottom">
            <h2 class="elements__header">Гора Эльбрус</h2>
            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
        <li class="elements__card">
          <img src="./images/kirill-pershin-1404681-unsplash.png" alt="Домбай" class="elements__image">
          <div class="elements__bottom">
            <h2 class="elements__header">Домбай</h2>
            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
        <li class="elements__card">
          <img src="./images/kirill-pershin-1556355-unsplash(1).png" alt="Гора Эльбрус" class="elements__image">
          <div class="elements__bottom">
            <h2 class="elements__header">Гора Эльбрус</h2>

            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
        <li class="elements__card">
          <img src="./images/kirill-pershin-1088404-unsplash.png" alt="Карачаево-Черкессия" class="elements__image">
          <div class="elements__bottom">
            <h2 class="elements__header">Карачаево-Черкессия</h2>
            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
        <li class="elements__card">

          <img src="./images/kirill-pershin-1556355-unsplash(1).png" alt="Гора Эльбрус" class="elements__image">
          <div class=" elements__bottom">
            <h2 class=" elements__header">Гора Эльбрус</h2>
            <img src="./images/Vector0.svg" alt="" class="elements__like">
          </div>
        </li>
      </ul>

    </section>
    <section class="popup popup_invisible">
      <div class="popup__container">
        <h2 class="popup__title">
          Редактировать профиль
        </h2>

        <form method="get" class="popup__form">
          <input value="" id="popupname" type="text" class="popup__input" placeholder="Жак Ив Кусто">

          <input value="" id="popupabout" type="text" class="popup__input" placeholder="Исследователь океана">
          <button class="popup__button_submit" type="submit">Сохранить</button>

        </form>


      </div>
      <img src="./images/Close-icon.svg" alt="Кнопка закрытия" class="popup__button_close">


    </section>

  </main>




  <footer class="footer">
    <p class="footer__copyright">&copy;2022. Mesto Russia</p>

  </footer>



  <script src="./scripts/script.js"></script>

</body>







</html>
