<!DOCTYPE html>
<html lang="ru">

<head>
  <meta name="description" content="Проект 4-го cпринта">
  <meta name="keywords" content="mesto">
  <meta name="author" content="Тужиков Роман">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href="./pages/index.css">
  <title>Mesto</title>

</head>

<body class="root">
  <header class="header">
    <img src="./images/logo.svg" alt="Лого" class="header__logo">
  </header>

  <main class="main">
    <section class="profile">
      <div class="profile__container">
        <img src="./images/avatar.jpg" alt="Лик Кусто" class="profile__avatar">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <button type="button" class="profile__edit-button"></button>
          <p class="profile__about">Исследователь океана</p>
        </div>
      </div>
      <button type="button" class="profile__add-button"></button>
    </section>

    <section class="elements">
      <ul class="elements__list">
        <template id="elements__card">
          <li class="elements__card">
            <button aria-label="trash-button" type="button" class="elements__trash"></button>
            <img src="" alt="" class="elements__image">
            <div class="elements__bottom">
              <h2 class=" elements__header"></h2>
              <button aria-label="like-button" type="button" class="elements__like"></button>
            </div>
          </li>
        </template> 
      </ul>
    </section>

    <section class="popup">
      <template id="popup__content">
        <div id="popup__content">
          <div class="popup__container">
            <h2 class="popup__title"></h2>
            <form name="popup-form" method="get" class="popup__form">
              <input name="input-name" value="" id="popupname" type="text" class="popup__input" placeholder="">
              <input name="input-about" value="" id="popupabout" type="text" class="popup__input" placeholder="">
              <button class="popup__submit-button" type="submit"></button>
            </form>
          </div>
          <button aria-label="popup-close-button" type="button" class="popup__close-button"></button>
        </div>
      </template>

      <template id="popup__card">
        <div id="popup__card" class="popup__card">
          <div class="popup__container--card">
            <img src="" alt="" class="popup__image" />
            <h2 class="popup__title--card"></h2>
          </div>
          <button aria-label="popup-close-button" type="button" class="popup__close-button--card"></button>
        </div>
      </template>
    </section>

  </main>

  <footer class="footer">
    <p class="footer__copyright">&copy;2022. Mesto Russia</p>
  </footer>

  <script async src="./scripts/index.js"></script>
  </body>
</html>
