<!DOCTYPE html>
<html lang="ru">

<head>
  <meta name="description" content="Проект 4-го cпринта">
  <meta name="keywords" content="mesto">
  <meta name="author" content="Тужиков Роман">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href="./pages/index.css">
  <title>Mesto</title>

</head>

<body class="root">
  <header class="header">
    <img src="./images/logo.svg" alt="Лого" class="header__logo">
  </header>

  <main class="main">
    <section class="profile">
      <div class="profile__container">
        <img src="./images/avatar.jpg" alt="Лик Кусто" class="profile__avatar">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <button type="button" class="profile__edit-button"></button>
          <p class="profile__about">Исследователь океана</p>
        </div>
      </div>
      <button type="button" class="profile__add-button"></button>
    </section>


    <section class="elements">
      <ul class="elements__list">
      </ul>
    </section>


    <section id="popupE" class="popup popup_profile">
      <div class="popup__container popup__container_profile">
        <h2 class="popup__title">
          Редактировать профиль
        </h2>
        <form name="popup-form" method="get" class="popup__form popup__form_profile">
          <input name="input-name" value="" id="popupname" type="text" class="popup__input popup__input_name"
            placeholder="Жак Ив Кусто">
          <input name="input-about" value="" id="popupabout" type="text" class="popup__input popup__input_about"
            placeholder="Исследователь океана">
          <button id="submitbuttonE" class="popup__submit-button" type="submit">Сохранить</button>
        </form>
      </div>
      <button aria-label="popup-close-button" type="button"
        class="popup__close-button popup__close-button_profile"></button>
    </section>


    <section class="popup popup_scaled">
      <div class="popup__container popup__container_scaled">
        <button aria-label="popup-close-button" type="button"
          class="popup__close-button popup__close-button_scaled"></button>
        <img src="./images/kirill-pershin-1404681-unsplash(1).png" alt="#" class="popup__image-scaled">
        <h2 class="popup__header-scaled">Алтай</h2>
      </div>
    </section>



    <section id="popupA" class="popup popup_add-card">
      <div class="popup__container popup__container_add-card">
        <h2 class="popup__title">Новое место</h2>
        <form name="popup-form" method="get" class="popup__form popup__form_card">
          <input name="input-name" value="" id="cardTitle" type="text" class="popup__input popup__input_title"
            placeholder="Название картинки">
          <input name="input-about" value="" id="cardLink" type="text" class="popup__input popup__input_link"
            placeholder="Ссылка на картинку">
          <button id="submitbuttonA" class="popup__submit-button" type="submit">Создать</button>
        </form>
      </div>
      <button aria-label="popup-close-button" type="button"
        class="popup__close-button popup__close-button_add-card"></button>
    </section>
  </main>




  <footer class="footer">
    <p class="footer__copyright">&copy;2022. Mesto Russia</p>
  </footer>

  <template id="card-template">
    <li class="elements__card">
      <img src="./images/Trash.svg" alt="Удалить карточку" class="elements__trash-btn">
      <img src="#" alt="#" class="elements__image">
      <div class="elements__bottom">
        <h2 class="elements__header">Карачаевск</h2>
        <button aria-label="like-button" type="button" class="elements__like"></button>
      </div>
    </li>
  </template>
  <script src="./scripts/InitialCards.js"></script>
  <script src="./scripts/index.js"></script>

</body>







</html>
